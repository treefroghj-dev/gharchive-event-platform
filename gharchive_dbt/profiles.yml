gharchive_events:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GHARCHIVE_GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('GHARCHIVE_BQ_DATASET') }}"
      keyfile: "{{ env_var('GHARCHIVE_GOOGLE_APPLICATION_CREDENTIALS_LOCAL') }}"
      location: "{{ env_var('GHARCHIVE_GCP_REGION') }}"
      threads: 4